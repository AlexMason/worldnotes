<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldNotes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0e0e10; }
    #app {
      max-width: 860px;
      height: 100vh;
      margin: 0 auto;
      border-left: 0.5px solid #1a1a20;
      border-right: 0.5px solid #1a1a20;
    }

    .wn-root {
      --wn-font-mono: "Raleway", serif !important;
      --wn-font-family: "Bitter", sans-serif !important;

      --wn-font-size-h1: 28px !important;
      --wn-font-size-h2: 24px !important;
      --wn-font-size-h3: 20px !important;
      --wn-font-size-body: 18px !important;
      --wn-font-size-small: 16px !important;
    }

  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/demo/demo.js"></script>
</body>
</html>
